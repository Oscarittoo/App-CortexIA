<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meetizy - Connexion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      padding: 24px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .logo {
      text-align: center;
      margin-bottom: 8px;
    }

    .logo-text {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 14px;
      color: #94a3b8;
      text-align: center;
      margin-bottom: 16px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
      font-size: 14px;
    }

    .tab.active {
      background: #38bdf8;
      color: #0f172a;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
    }

    input {
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #38bdf8;
      background: rgba(255, 255, 255, 0.08);
    }

    input::placeholder {
      color: #64748b;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .info-text {
      font-size: 12px;
      color: #64748b;
      text-align: center;
      margin-top: 8px;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top: 3px solid #38bdf8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #registerForm {
      display: none;
    }

    #registerForm.active,
    #loginForm.active {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-text">Meetizy</div>
    </div>
    <p class="tagline">Transformez vos réunions en actions</p>

    <div class="tabs">
      <div class="tab active" data-tab="login">Connexion</div>
      <div class="tab" data-tab="register">Inscription</div>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 12px; color: #94a3b8;">Connexion en cours...</p>
    </div>

    <!-- Formulaire de connexion -->
    <form id="loginForm" class="active">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="votre@email.com" required>
      </div>

      <div class="form-group">
        <label for="loginPassword">Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary">Se connecter</button>
      
      <p class="info-text">
        Première visite ? Créez un compte gratuitement !
      </p>
    </form>

    <!-- Formulaire d'inscription -->
    <form id="registerForm">
      <div class="form-group">
        <label for="registerName">Nom complet</label>
        <input type="text" id="registerName" placeholder="Jean Dupont" required>
      </div>

      <div class="form-group">
        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" placeholder="votre@email.com" required>
      </div>

      <div class="form-group">
        <label for="registerPassword">Mot de passe</label>
        <input type="password" id="registerPassword" placeholder="••••••••" required minlength="6">
      </div>

      <button type="submit" class="btn btn-primary">Créer mon compte</button>
      
      <p class="info-text">
        En vous inscrivant, vous obtenez 1 réunion gratuite !
      </p>
    </form>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
