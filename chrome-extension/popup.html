<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meetizy Agent IA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #94a3b8;
    }

    .status {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .status-row:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-size: 13px;
      color: #94a3b8;
    }

    .status-value {
      font-size: 13px;
      font-weight: 600;
      color: #38bdf8;
    }

    .status-connected {
      color: #10b981;
    }

    .status-disconnected {
      color: #ef4444;
    }

    .btn {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #000;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }

    .actions {
      margin-top: 16px;
    }

    .info {
      text-align: center;
      font-size: 11px;
      color: #64748b;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .recording-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎯</div>
    <h1>Meetizy Agent IA</h1>
    <p class="subtitle">Assistant IA pour vos réunions</p>
  </div>
  <!-- Informations utilisateur -->
  <div id="userInfo"></div>

  <!-- Quotas -->
  <div id="quotasInfo"></div>
  <div class="status">
    <div class="status-row">
      <span class="status-label">Statut</span>
      <span class="status-value status-disconnected" id="connectionStatus">Déconnecté</span>
    </div>
    <div class="status-row">
      <span class="status-label">Plateforme détectée</span>
      <span class="status-value" id="platformName">Aucune</span>
    </div>
    <div class="status-row">
      <span class="status-label">Transcription</span>
      <span class="status-value" id="transcriptionStatus">Inactive</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="startBtn">
      <span id="startBtnText">▶ Démarrer la transcription</span>
    </button>
    <button class="btn btn-secondary" id="openDashboardBtn">
      📊 Ouvrir Meetizy
    </button>
    <button class="btn btn-secondary" id="settingsBtn">
      ⚙️ Paramètres
    </button>
    <button class="btn btn-secondary" id="logoutBtn" onclick="logout()">
      🚪 Déconnexion
    </button>
  </div>

  <div class="info">
    Version 1.0.0 · © 2026 Meetizy
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
