<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>MEETIZY Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      color: #e2e8f0;
      overflow: hidden;
      user-select: none;
      height: 100vh;
    }

    #bar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 52px;
      padding: 0 12px;
      background: rgba(10, 12, 24, 0.92);
      border: 1px solid rgba(102, 126, 234, 0.35);
      border-radius: 14px;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }

    .brand {
      -webkit-app-region: drag;
      display: flex; align-items: center; gap: 7px;
      padding-right: 10px;
      border-right: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .brand-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #10b981; box-shadow: 0 0 6px #10b981;
      animation: pulse-dot 2s infinite;
    }
    .brand-dot.idle { background: #334155; box-shadow: none; animation: none; }
    .brand-name { font-size: 12px; font-weight: 800; letter-spacing: 1.5px; color: #e2e8f0; text-transform: uppercase; }

    .action-btns { -webkit-app-region: no-drag; display: flex; align-items: center; gap: 4px; flex: 1; }

    .action-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: #94a3b8;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.18s; white-space: nowrap;
    }
    .action-btn:hover { background: rgba(102,126,234,0.15); border-color: rgba(102,126,234,0.4); color: #c7d2fe; }
    .action-btn.active { background: rgba(102,126,234,0.2); border-color: rgba(102,126,234,0.5); color: #818cf8; }
    .action-btn.recording { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #fca5a5; }

    #timer-display {
      -webkit-app-region: no-drag;
      font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: #f1f5f9; letter-spacing: 1px; padding: 0 10px;
      border-left: 1px solid rgba(255,255,255,0.08);
      border-right: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .controls { -webkit-app-region: no-drag; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .ctrl-btn {
      width: 26px; height: 26px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #64748b;
      font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
    .ctrl-btn.close:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4); color: #fca5a5; }

    #chat-panel {
      display: none; flex-direction: column; height: 408px;
      background: rgba(10, 12, 24, 0.95);
      border: 1px solid rgba(102,126,234,0.3); border-top: none;
      border-radius: 0 0 14px 14px;
      backdrop-filter: blur(16px); overflow: hidden;
    }
    #chat-panel.open { display: flex; }

    #messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .msg { display: flex; gap: 8px; align-items: flex-start; max-width: 90%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
      background: rgba(102,126,234,0.2); border: 1px solid rgba(102,126,234,0.3);
    }
    .msg.user .msg-avatar { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.3); }
    .msg-bubble {
      padding: 9px 13px; border-radius: 12px;
      font-size: 13px; line-height: 1.55; color: #e2e8f0;
    }
    .msg.bot .msg-bubble {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-top-left-radius: 3px;
    }
    .msg.user .msg-bubble {
      background: rgba(102,126,234,0.2); border: 1px solid rgba(102,126,234,0.3); border-top-right-radius: 3px;
    }

    .screenshot-preview {
      width: 100%; max-height: 120px; object-fit: cover;
      border-radius: 8px; border: 1px solid rgba(102,126,234,0.25);
      margin-bottom: 6px; cursor: pointer; display: block;
    }

    .chat-input-row {
      display: flex; gap: 8px; padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
    }
    #chat-input {
      flex: 1; padding: 9px 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: #e2e8f0; font-size: 13px; outline: none; transition: border-color 0.2s;
    }
    #chat-input:focus { border-color: rgba(102,126,234,0.5); }
    #chat-input::placeholder { color: #475569; }
    .send-btn {
      padding: 9px 14px; background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .typing { display: flex; gap: 4px; align-items: center; padding: 8px 12px; }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #667eea; animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  </style>
</head>
<body>

  <div id="bar">
    <div class="brand">
      <div class="brand-dot idle" id="brand-dot"></div>
      <span class="brand-name">Meetizy</span>
    </div>
    <div class="action-btns">
      <button class="action-btn" id="btn-session" onclick="toggleSession()"><span>&#9654;</span> Session</button>
      <button class="action-btn" id="btn-analyze" onclick="analyzeScreen()"><span>&#128248;</span> Analyser l'ecran</button>
      <button class="action-btn" id="btn-chat" onclick="toggleChat()"><span>&#128172;</span> Chat</button>
    </div>
    <div id="timer-display">00:00</div>
    <div class="controls">
      <button class="ctrl-btn" onclick="openApp()" title="Ouvrir Meetizy">&#8599;</button>
      <button class="ctrl-btn close" onclick="closeOverlay()" title="Masquer">&#x2715;</button>
    </div>
  </div>

  <div id="chat-panel">
    <div id="messages">
      <div class="msg bot">
        <div class="msg-avatar">&#129302;</div>
        <div class="msg-bubble">
          Bonjour ! Je suis votre assistant Meetizy.<br/>
          Je peux <strong>resumer votre reunion</strong>, analyser votre ecran ou repondre a vos questions.
        </div>
      </div>
    </div>
    <div class="chat-input-row">
      <input id="chat-input" placeholder="Posez votre question..." onkeydown="handleKey(event)" />
      <button class="send-btn" id="send-btn" onclick="sendMessage()">&#8679;</button>
    </div>
  </div>

  <script>
    var isRecording = false, isPaused = false, seconds = 0;
    var timerInterval = null, recognition = null;
    var transcriptLines = [], chatOpen = false, isBotTyping = false;
    var COLLAPSED_H = 52, EXPANDED_H = 460;

    function formatTime(s) {
      var h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
      if (h > 0) return h+':'+pad(m)+':'+pad(sec);
      return pad(m)+':'+pad(sec);
    }
    function pad(n) { return String(n).padStart(2,'0'); }
    function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }
    function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function addMessage(role, html, imgSrc) {
      var msgs = document.getElementById('messages');
      var d = document.createElement('div'); d.className = 'msg '+role;
      var av = document.createElement('div'); av.className = 'msg-avatar';
      av.textContent = role === 'user' ? String.fromCodePoint(0x1F464) : String.fromCodePoint(0x1F916);
      var bub = document.createElement('div'); bub.className = 'msg-bubble';
      if (imgSrc) {
        var img = document.createElement('img');
        img.src = imgSrc; img.className = 'screenshot-preview';
        img.onclick = function() { var w=window.open(); w.document.write('<body style="background:#000;margin:0;display:flex;align-items:center;justify-content:center;height:100vh;"><img src="'+imgSrc+'" style="max-width:100%;max-height:100%;"/></body>'); };
        bub.appendChild(img);
      }
      bub.innerHTML += html;
      d.appendChild(av); d.appendChild(bub);
      msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
    }

    function showTyping() {
      var msgs = document.getElementById('messages');
      var d = document.createElement('div'); d.className = 'msg bot'; d.id = 'typing-indicator';
      d.innerHTML = '<div class="msg-avatar">&#129302;</div><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
      msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
    }
    function hideTyping() { var el = document.getElementById('typing-indicator'); if(el) el.remove(); }

    function toggleChat() {
      chatOpen = !chatOpen;
      document.getElementById('chat-panel').classList.toggle('open', chatOpen);
      document.getElementById('btn-chat').classList.toggle('active', chatOpen);
      if (window.electronAPI && window.electronAPI.setOverlayHeight) {
        window.electronAPI.setOverlayHeight(chatOpen ? EXPANDED_H : COLLAPSED_H);
      }
      if (chatOpen) { setTimeout(function(){ document.getElementById('chat-input').focus(); }, 100); }
    }

    function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

    async function sendMessage() {
      if (isBotTyping) return;
      var input = document.getElementById('chat-input');
      var text = input.value.trim(); if (!text) return;
      input.value = '';
      addMessage('user', escHtml(text));
      isBotTyping = true;
      document.getElementById('send-btn').disabled = true;
      showTyping();
      await sleep(600 + Math.random()*400);
      hideTyping();
      addMessage('bot', generateBotResponse(text));
      isBotTyping = false;
      document.getElementById('send-btn').disabled = false;
    }

    function generateBotResponse(query) {
      var q = query.toLowerCase();
      if (q.includes('r\u00e9sum') || q.includes('resum')) {
        if (transcriptLines.length===0) return 'Aucune transcription disponible. D\u00e9marrez une session.';
        return '<strong>R\u00e9sum\u00e9 :</strong><br/>'+transcriptLines.slice(-8).map(function(s){return '&#8226; '+escHtml(s);}).join('<br/>');
      }
      if (q.includes('action') || q.includes('t\u00e2che')) return 'Les actions seront extraites automatiquement \u00e0 la fin de la session dans le rapport Meetizy.';
      if (q.includes('d\u00e9cision') || q.includes('decision')) return 'Notez vos d\u00e9cisions ici et elles seront int\u00e9gr\u00e9es au compte-rendu final.';
      if (q.includes('dur\u00e9e') || q.includes('temps')) return isRecording ? 'Session en cours depuis <strong>'+formatTime(seconds)+'</strong>.' : 'Aucune session active.';
      if (q.includes('aide') || q.includes('help')) return '<strong>Je peux :</strong><br/>&#8226; R\u00e9sumer la r\u00e9union<br/>&#8226; Analyser l\''\'''\''cran<br/>&#8226; Lister les actions<br/>&#8226; R\u00e9pondre \u00e0 vos questions';
      var defaults = [
        'Je note. Continuez la r\u00e9union, je synth\u00e9tise en temps r\u00e9el.',
        'Bonne question ! D\u00e9marrez une session pour une analyse compl\u00e8te.',
        'Je suis l\u00e0 pour vous assister discr\u00e8tement. Que souhaitez-vous analyser ?'
      ];
      return defaults[Math.floor(Math.random()*defaults.length)];
    }

    function toggleSession() {
      if (!isRecording) startSession();
      else if (isPaused) resumeSession();
      else pauseSession();
    }

    function startSession() {
      isRecording = true; isPaused = false; seconds = 0; transcriptLines = [];
      document.getElementById('brand-dot').classList.remove('idle');
      var btn = document.getElementById('btn-session');
      btn.classList.add('recording'); btn.innerHTML = '<span>&#9646;&#9646;</span> Pause';
      if (window.electronAPI) window.electronAPI.startSession({});
      timerInterval = setInterval(function(){
        if (!isPaused) { seconds++; document.getElementById('timer-display').textContent = formatTime(seconds); }
      }, 1000);
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SR) {
        recognition = new SR(); recognition.continuous = true; recognition.interimResults = false; recognition.lang = 'fr-FR';
        recognition.onresult = function(e) {
          var text = e.results[e.results.length-1][0].transcript.trim();
          if (text) {
            transcriptLines.push(text); if (transcriptLines.length>50) transcriptLines.shift();
            if (chatOpen) addMessage('bot', '<em style="color:#64748b;font-size:11px;">&#128221; '+escHtml(text)+'</em>');
          }
        };
        recognition.onend = function(){ if (isRecording && !isPaused) { try { recognition.start(); } catch(e){} } };
        recognition.start();
      }
      if (chatOpen) addMessage('bot', '&#9654; Session d\u00e9marr\u00e9e. Je transcris en temps r\u00e9el.');
    }

    function pauseSession() {
      isPaused = true; if (recognition) recognition.stop();
      document.getElementById('btn-session').innerHTML = '<span>&#9654;</span> Reprendre';
    }
    function resumeSession() {
      isPaused = false; if (recognition) { try { recognition.start(); } catch(e){} }
      document.getElementById('btn-session').innerHTML = '<span>&#9646;&#9646;</span> Pause';
    }
    function stopSession() {
      isRecording = false; isPaused = false;
      clearInterval(timerInterval); if (recognition) { recognition.stop(); recognition = null; }
      document.getElementById('brand-dot').classList.add('idle');
      var btn = document.getElementById('btn-session');
      btn.classList.remove('recording'); btn.innerHTML = '<span>&#9654;</span> Session';
      document.getElementById('timer-display').textContent = '00:00';
      if (window.electronAPI) window.electronAPI.stopSession();
      if (chatOpen && transcriptLines.length>0) addMessage('bot', '&#10003; Session termin\u00e9e ('+formatTime(seconds)+'). Ouvrez Meetizy pour le rapport.');
      seconds = 0;
    }

    async function analyzeScreen() {
      var btn = document.getElementById('btn-analyze');
      btn.classList.add('active'); btn.innerHTML = '<span>&#9203;</span> Capture...';
      if (!chatOpen) toggleChat();
      addMessage('user', '&#128248; Analyser mon \u00e9cran');
      try {
        var imgData = null;
        if (window.electronAPI && window.electronAPI.captureScreen) {
          imgData = await window.electronAPI.captureScreen();
        }
        showTyping(); await sleep(1200); hideTyping();
        if (imgData) {
          addMessage('bot', '<strong>&#128248; Capture effectu\u00e9e !</strong><br/>Contenu visible analys\u00e9.<br/><br/>Pour une analyse IA d\u00e9taill\u00e9e, configurez votre cl\u00e9 API dans les param\u00e8tres Meetizy.', imgData);
        } else {
          addMessage('bot', 'Capture d\'\u00e9cran disponible dans l\'application install\u00e9e. En d\u00e9veloppement, utilisez l\'app packag\u00e9e.');
        }
      } catch(e) {
        hideTyping(); addMessage('bot', '&#9888; Impossible de capturer l\'\u00e9cran. V\u00e9rifiez les permissions syst\u00e8me.');
      } finally {
        btn.classList.remove('active'); btn.innerHTML = '<span>&#128248;</span> Analyser l\'\u00e9cran';
      }
    }

    function openApp() { if (window.electronAPI) window.electronAPI.openMainWindow(); }
    function closeOverlay() { if (window.electronAPI) window.electronAPI.closeOverlay(); }
    window.addEventListener('keydown', function(e) { if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='M') closeOverlay(); });
  </script>
</body>
</html>
